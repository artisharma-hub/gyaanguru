name: gyaan_guru
description: "Live multiplayer quiz battle for Indian users"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # Storage
  shared_preferences: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Share
  share_plus: ^9.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # Lottie animations
  lottie: ^3.1.0

  # UUID
  uuid: ^4.3.3

  # HTTP status & utilities
  intl: ^0.19.0

  # Image picker (profile photo)
  image_picker: ^1.0.7

  # Deep links (challenge share links)
  app_links: ^6.4.0

  # Sound effects
  audioplayers: ^6.0.0

  # Environment variables
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/sounds/
